<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン | 運転士学科試験対策</title>

<style>
:root {
  --primary-color: #2b6cb0;
  --primary-hover: #2c5282;
  --bg-color: #f7fafc;
  --card-bg: #ffffff;
  --text-color: #2d3748;
  --border-color: #e2e8f0;
  --error-color: #e53e3e;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
               "Helvetica Neue", Arial, sans-serif;
  background-color: var(--bg-color);
  color: var(--text-color);
  margin: 0;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  box-sizing: border-box;
}

.container {
  max-width: 400px;
  width: 100%;
  background: var(--card-bg);
  padding: 35px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
}

h2 {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-top: 0;
  margin-bottom: 24px;
  color: #1a202c;
}

.form-group {
  margin-bottom: 20px;
}

input[type="password"] {
  width: 100%;
  padding: 14px 16px;
  font-size: 16px;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  box-sizing: border-box;
  outline: none;
  transition: all 0.2s ease;
  background-color: #fafafa;
}

input[type="password"]:focus {
  border-color: var(--primary-color);
  background-color: #ffffff;
  box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1);
}

.login-btn {
  display: block;
  width: 100%;
  padding: 14px;
  font-size: 16px;
  font-weight: 600;
  color: #ffffff;
  background-color: var(--primary-color);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.login-btn:hover {
  background-color: var(--primary-hover);
}

.login-btn:disabled {
  background-color: #a0aec0;
  cursor: not-allowed;
}

.error-message {
  font-size: 14px;
  font-weight: 600;
  color: var(--error-color);
  text-align: center;
  margin-top: 16px;
  margin-bottom: 0;
  min-height: 21px;
}
</style>

</head>

<body>

<div class="container">

  <h2>パスワードを入力</h2>

  <div class="form-group">
    <input
      type="password"
      id="pw"
      placeholder="パスワードを入力してください"
      onkeydown="if(event.key==='Enter') login()"
    >
  </div>

  <button
    onclick="login()"
    class="login-btn"
    id="loginBtn"
  >
    ログイン
  </button>

  <p id="msg" class="error-message"></p>

</div>

<script>

// SHA-256 ハッシュ化
async function sha256(text){

  const msgUint8 =
    new TextEncoder().encode(text);

  const hashBuffer =
    await crypto.subtle.digest('SHA-256', msgUint8);

  const hashArray =
    Array.from(new Uint8Array(hashBuffer));

  const hashHex =
    hashArray
      .map(b => b.toString(16).padStart(2,'0'))
      .join('');

  return hashHex;
}

// メッセージ表示
function showMessage(text, clearAfter = false){

  const msg =
    document.getElementById("msg");

  msg.innerText = text;

  // 5秒後に消す
  if(clearAfter){

    setTimeout(() => {

      // 同じメッセージなら消す
      if(msg.innerText === text){
        msg.innerText = "";
      }

    }, 5000);
  }
}

// 失敗回数
let failCount =
  parseInt(localStorage.getItem("failCount")) || 0;

// ロック終了時刻
let lockUntil =
  parseInt(localStorage.getItem("lockUntil")) || 0;

// ページ読み込み時
window.onload = function(){

  // ロック継続中
  if(Date.now() < lockUntil){

    document.getElementById("loginBtn").disabled = true;

    // 自動解除
    const remain =
      lockUntil - Date.now();

    setTimeout(() => {

      document.getElementById("loginBtn").disabled = false;

    }, remain);
  }
};

async function login(){

  const now = Date.now();

  // ロック中
  if(now < lockUntil){

    return;
  }

  // ボタン有効化
  document.getElementById("loginBtn").disabled = false;

  const password =
    document.getElementById("pw").value;

  const hash =
    await sha256(password);

  const correctHash =
    "b6797bc4d4032ea60322cfc01e8ae586b52542f1f7c62268d5a28398c0ff0072";

  // 正解
  if(hash === correctHash){

    failCount = 0;

    localStorage.removeItem("failCount");
    localStorage.removeItem("lockUntil");

    sessionStorage.setItem("auth", "ok");

    location.href = "untenshi/home.html";
  }

  // 不正解
  else {

    failCount++;

    localStorage.setItem("failCount", failCount);

    let waitSeconds = 0;

    // 1〜2回目
    if(failCount <= 2){

      showMessage("パスワードが違います");
    }

    // 3〜5回目
    else if(failCount <= 5){

      waitSeconds = 5;

      showMessage(
        "5秒後におためしください",
        true
      );
    }

    // 6〜10回目
    else if(failCount <= 10){

      waitSeconds = 30;

      showMessage(
        "間違えすぎやろボケぃ",
        true
      );
    }

    // 11回目以降
    else {

      waitSeconds = 1440 * 60;

      showMessage(
        "貨物",
        true
      );
    }

    // ロック開始
    if(waitSeconds > 0){

      lockUntil =
        Date.now() + waitSeconds * 1000;

      localStorage.setItem(
        "lockUntil",
        lockUntil
      );

      // ボタン無効化
      document.getElementById("loginBtn").disabled = true;

      // 自動解除
      setTimeout(() => {

        document.getElementById("loginBtn").disabled = false;

      }, waitSeconds * 1000);
    }
  }
}

</script>

</body>
</html>
