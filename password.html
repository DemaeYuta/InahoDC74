<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
  font-family:sans-serif;
  text-align:center;
  margin-top:100px;
}

input{
  padding:10px;
  font-size:18px;
}

button{
  padding:10px 20px;
  font-size:18px;
  margin-left:10px;
}

</style>

</head>

<body>

<h2>パスワードを入力</h2>

<input type="password" id="pw">
<button onclick="login()">ログイン</button>

<p id="msg"></p>

<script>

async function sha256(text){

  const msgUint8 = new TextEncoder().encode(text);

  const hashBuffer =
    await crypto.subtle.digest('SHA-256', msgUint8);

  const hashArray =
    Array.from(new Uint8Array(hashBuffer));

  const hashHex =
    hashArray.map(b =>
      b.toString(16).padStart(2,'0')
    ).join('');

  return hashHex;

}

async function login(){

  const password =
    document.getElementById("pw").value;

  const hash =
    await sha256(password);

  const correctHash =
    "b6797bc4d4032ea60322cfc01e8ae586b52542f1f7c62268d5a28398c0ff0072";

  if(hash === correctHash){

    sessionStorage.setItem("auth","ok");

    location.href = "untenshi/home.html";

  }else{

    document.getElementById("msg")
      .innerText = "パスワードが違います";

  }

}

</script>

</body>
</html>
