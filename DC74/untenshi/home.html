<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トップページ | 運転士学科試験対策</title>

<script>
// =========================
// 未ログインなら戻す
// =========================
if(sessionStorage.getItem("auth") !== "ok"){
  location.href = "../password.html";
}

// =========================
// ログアウト
// =========================
function logout(){
  sessionStorage.removeItem("auth");
  location.href = "../password.html";
}
</script>

<style>
:root {
  --primary-color: #2b6cb0; /* 信頼感のあるブルー */
  --primary-hover: #2c5282;
  --bg-color: #f7fafc;      /* 明るいグレーの背景 */
  --card-bg: #ffffff;
  --text-color: #2d3748;
  --text-muted: #718096;
  --border-color: #e2e8f0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background-color: var(--bg-color);
  color: var(--text-color);
  margin: 0;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  box-sizing: border-box;
}

.container {
  max-width: 480px;
  width: 100%;
  background: var(--card-bg);
  padding: 35px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
}

h1 {
  font-size: 24px;
  font-weight: 700;
  text-align: center;
  margin-top: 0;
  margin-bottom: 8px;
  color: #1a202c;
}

.subtitle {
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 30px;
}

.section-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-top: 20px;
  margin-bottom: 8px;
  padding-left: 4px;
}

.menu-link {
  display: block;
  background: var(--card-bg);
  color: var(--text-color);
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  padding: 16px 20px;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  margin-bottom: 12px;
  transition: all 0.2s ease;
}

.menu-link:hover {
  border-color: var(--primary-color);
  color: var(--primary-color);
  background-color: #f0f7ff;
  transform: translateY(-1px);
}

.logout-btn {
  display: block;
  width: 100%;
  margin-top: 35px;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-muted);
  background: none;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.logout-btn:hover {
  color: #e53e3e; /* 警告色のマイルドな赤 */
  border-color: #fed7d7;
  background-color: #fff5f5;
}
</style>

</head>

<body>

<div class="container">

  <h1>運転士の学科試験対策サイト</h1>
  <p class="subtitle">AIをフル活用し作成しました<br>問題の誤りや改善要望等は前出まで</p>

  <div class="section-title">共通</div>
  <a href="unpou/index.html" class="menu-link">運転法規</a>

  <div class="section-title">DC</div>
  <a href="nainen/index.html" class="menu-link">内燃機関</a>

  <button onclick="logout()" class="logout-btn">
    ログアウト
  </button>

</div>

</body>
</html>
