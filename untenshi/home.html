<script>
// =========================
// 未ログインなら戻す
// =========================
if (sessionStorage.getItem("auth") !== "ok") {
  location.href = "../index.html";
}

// ログアウト
function logout() {
  sessionStorage.removeItem("auth");
  location.href = "../index.html";
}

// =========================
// JSONから最新の更新日と履歴を取得して表示
// =========================
window.addEventListener('DOMContentLoaded', () => {
  fetch('update.json')
    .then(response => {
      if (!response.ok) throw new Error('Network response was not ok');
      return response.json();
    })
    .then(data => {
      // 1. 各メニューの最終更新日を反映
      const links = document.querySelectorAll('.menu-link[data-key]');
      links.forEach(link => {
        // data-keyを小文字に統一して比較（バグ防止）
        const key = link.getAttribute('data-key').toLowerCase();
        const dateSpan = link.querySelector('.update-date');
        
        if (data.menu && data.menu[key]) {
          dateSpan.textContent = `最終更新: ${data.menu[key]}`;
        }
      });

      // 2. 更新履歴（お知らせ欄）の描画
      const historyList = document.getElementById('history-list');
      if (historyList && data.history && Array.isArray(data.history)) {
        historyList.innerHTML = data.history.map(item => `
          <div class="history-item">
            <span class="history-date">${item.date}</span>
            <span class="history-text">${item.text}</span>
          </div>
        `).join('');
      }
    })
    .catch(error => {
      console.error('データの読み込みに失敗しました:', error);
      // 読み込めなかった場合は日付を空欄にする
      document.querySelectorAll('.update-date').forEach(span => span.textContent = '');
    });
});
</script>

/*教科*/
.menu-link {

  justify-content: space-between;  /* テキストと日付を両端に分ける */
  align-items: center;             /* 上下中央揃え */

  color: var(--text-color);        /*テキスト色*/
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  padding: 16px 20px;
  border: 1px solid var(--kyouka-mawari);
  border-radius: 12px;
  margin-bottom: 12px;
  transition: all 0.2s ease;
}

.menu-link:hover {

  color: var(--primary-color);
  background-color: #f0f7ff;
  transform: translateY(-1px);
}

/* 右側に表示される日付バッジのスタイル */
.update-date {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: normal;
  background: #edf2f7;
  padding: 3px 8px;
  border-radius: 20px;
  transition: all 0.2s ease;
}

.menu-link:hover .update-date {
  background: #e2e8f0;
}

/* --- 追加：更新履歴（お知らせ）のスタイル --- */
.history-box {
  background: #f8fafc;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 15px;
  margin-top: 25px;
  max-height: 150px;
  overflow-y: auto; /* 履歴が増えたらスクロール可能に */
}

.history-item {
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 8px;
  display: flex;
  align-items: flex-start;
}

.history-item:last-child {
  margin-bottom: 0;
}

.history-date {
  font-weight: 600;
  color: var(--primary-color);
  min-width: 85px; /* 日付の幅を固定して綺麗に揃える */
  display: inline-block;
}

.history-text {
  color: var(--text-color);
}
/* -------------------------------------------- */
