<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="images/54hanasaki.png" type="image/png">

<script>
// =========================
// 未ログインなら戻す
// =========================
if(sessionStorage.getItem("auth") !== "ok"){
  location.href = "../index.html";
}

// ログアウト
function logout(){
  sessionStorage.removeItem("auth");
  location.href = "../index.html";
}

// =========================
// JSONから最新の更新日を取得して表示
// =========================
window.addEventListener('DOMContentLoaded', () => {
  // 指定されたファイル名 update.json を読み込む
  fetch('update.json')
    .then(response => {
      if (!response.ok) throw new Error('Network response was not ok');
      return response.json();
    })
    .then(data => {
      // data-key 属性を持っているメニューリンクをすべてループ処理
      const links = document.querySelectorAll('.menu-link[data-key]');
      links.forEach(link => {
        const key = link.getAttribute('data-key');
        const dateSpan = link.querySelector('.update-date');
        
        // JSON内の最終更新日(現状手入力)を表示
        if (data[key]) {
          dateSpan.textContent = `最終更新: ${data[key]}`;
        }
      });
    })
    .catch(error => {
      console.error('更新日の読み込みに失敗しました:', error);
      // 読み込めなかった場合はバッジを空欄にする
      document.querySelectorAll('.update-date').forEach(span => span.textContent = '');
    });
});
</script>

<style>
:root {
  --primary-color: #2b6cb0; /* 信頼感のあるブルー */
  --primary-hover: #2c5282;
  --bg-color: #f7fafc;      /* 明るいグレーの背景 */

}

body {

  background-color: var(--bg-color);
  color: var(--text-color);
  margin: 0;
  padding: 40px 20px;

  justify-content: center;
  align-items: center;

  box-sizing: border-box;
}

.container {
  max-width: 480px;
  width: 100%;
  background: var(--card-bg);
  padding: 35px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
}

h1 {
  font-size: 24px;
  font-weight: 700;
  text-align: center;
  margin-top: 0;
  margin-bottom: 8px;
  color: #1a202c;
}

.subtitle {
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 30px;
}

.section-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-top: 20px;
  margin-bottom: 8px;
  padding-left: 4px;
}

.menu-link {
  display: flex;                   /* 中身を横並びにする */
  justify-content: space-between;  /* テキストと日付を両端に分ける */
  align-items: center;             /* 上下中央揃え */
  background: var(--card-bg);
  color: var(--text-color);
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  padding: 16px 20px;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  margin-bottom: 12px;
  transition: all 0.2s ease;
}

.menu-link:hover {
  border-color: var(--primary-color);
  color: var(--primary-color);
  background-color: #f0f7ff;
  transform: translateY(-1px);
}

/* 右側に表示される日付バッジのスタイル */
.update-date {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: normal;
  background: #edf2f7;
  padding: 3px 8px;
  border-radius: 20px;
  transition: all 0.2s ease;
}

.menu-link:hover .update-date {
  background: #e2e8f0;
}

.logout-btn {
  display: block;
  width: 100%;
  margin-top: 35px;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-muted);
  background: none;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.logout-btn:hover {
  color: #e53e3e; /* 警告色のマイルドな赤 */
  border-color: #fed7d7;
  background-color: #fff5f5;
}
</style>

</head>
